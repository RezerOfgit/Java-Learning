<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Element UI 组件“拿来主义”体验</title>
</head>
<body>
【要求】：

在你刚才创建的 Vue 工程中，安装并引入 Element UI（跟紧视频步骤）。

打开 src/App.vue（这是 Vue 的根组件），把里面默认的欢迎内容全删掉。

核心动作：去 Element UI 官方文档，随便找一个带有数据的表格组件 (Table) 和一个分页组件 (Pagination)，将它们的代码直接复制到你的 App.vue 的 <template> 和 <script> 区域中。

启动项目，看着原本需要写几百行 CSS 的精美表格瞬间出现在你面前！
</body>
</html>

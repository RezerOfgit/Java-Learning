    <title>生产环境打包 (Build)</title>
</head>
<body>
【具体要求】：

在 IDEA 的终端 (Terminal) 里，停止当前的运行（按 Ctrl + C）。

输入终极编译命令：npm run build 并回车。

耐心等待几十秒，看着终端里的进度条跑完。

去左侧的目录树里看，vue-project 下面会自动生成一个名为 dist 的文件夹。

后端感悟：点开它，你会发现里面只有普通的 index.html 和几个压缩过的 .js、.css 文件。这就是你这几天学的所有前端知识的最终结晶！以后在公司，你就是把这个 dist 文件夹发给运维，让他放到服务器上的。
</body>
</html>

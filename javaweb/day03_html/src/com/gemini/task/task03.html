<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>跑通第一个前端工程</title>
</head>
<body>
严格按照视频要求，安装 Node.js。
使用 Vue CLI（或视频教的图形化界面 vue ui）创建一个正规的 Vue 工程
（建议命名为 vue-project，放在 Java-Learning/javaweb 目录下）。
在终端（Terminal）运行启动命令（通常是 npm run serve 或 npm run dev），
在浏览器中看到默认的 Vue 欢迎页面即算通关！
</body>
</html>

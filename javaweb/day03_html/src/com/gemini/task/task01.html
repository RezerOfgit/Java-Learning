<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Axios 异步获取数据并渲染 (GET 请求)</title>
    <script src="../../js/axios-0.18.0.js"></script>
    <script src="../../js/vue.js"></script>
</head>
<body>
<div id="app">
<h6>用户姓名:{{ user.name }}</h6>
    <p>联系邮箱: {{ user.email }}</p>

</div>
</body>

<script>
    new Vue({
        el: "#app",
        data: {
            user: {}
        },
        mounted() {
            axios.get("https://jsonplaceholder.typicode.com/users/1")
                .then(result => {
                    this.user = result.data;
                })
                .catch(error => {
                    console.log("请求失败" + error);
                });
        }
    });
</script>
</html>

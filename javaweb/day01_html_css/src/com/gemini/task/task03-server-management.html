<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>资产列表表格</title>

    <style>
        table {
            width: 500px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<table>
    <tr>
        <th>服务器ID</th>
        <th>操作系统</th>
        <th>IP地址</th>
    </tr>
    <tr>
        <td>001</td>
        <td>Windows 10</td>
        <td>192.168.255.255</td>
    </tr>
    <tr>
        <td>002</td>
        <td>Linux</td>
        <td>192.168.0.0</td>
    </tr>
</table>
<hr>
<form action="/api/server/add" method="post">
    服务器名称: <input type="text" name="serverName"> <br><br>
    Root密码: <input type="password" name="rootPassword"> <br><br>
    机器类型: <label><input type="radio" name="machineType" value="1"> 物理机 </label>
    <label><input type="radio" name="machineType" value="2"> 虚拟机 </label> <br><br>
    机房位置: <select name="location">
    <option value="">----------- 请选择 -----------</option>
    <option value="1">北京机房</option>
    <option value="2">上海机房</option>
</select> <br><br>
    <input type="submit" value="确认录入">

</form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>系统升级公告</title>
    <style>
        div{
            width: 600px;
            margin: 0 auto;
        }
        h1{
            color: #003366;
            text-align: center;
        }
        /*具体要求：*/
/*将 Task01 中的所有内容（标题、分割线、正文、链接）包裹在一个 `div` 标签中。*/
/*在 `<head>` 中使用 `<style>` 标签编写 CSS。*/
/*将包含所有内容的那个 `div` 宽度设置为 `600px`，并在浏览器中居中显示（提示：`margin: 0 auto;`）。*/
/*大标题颜色设置为深蓝色（`#003366`），且文本居中对齐。*/
/***样式规则 3（行内突出）**：用 `span` 标签把第一段正文中的 **“停机维护”** 四个字包裹起来，并将这四个字的字体颜色设为红色（`red`），字体加粗（`bold`）。*/

    </style>
</head>
<body>
<div>
    <h1>核心业务系统 V2.0 升级公告</h1>

    <hr>

    <p>
        尊敬的开发者，系统将于本周六凌晨 00:00 进行  <span style="color: red; font-weight: bold;">停机维护</span>。
    </p>

    <p>
        维护期间，所有数据库写入操作将暂停，请提前做好准备。
    </p>

    <a href="https://www.google.com" target="_blank">点击查看详细升级文档</a>

</div>
</body>
</html>

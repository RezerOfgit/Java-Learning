<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>事件绑定与生命周期钩子</title>
    <script src="../../rezero/js/vue.js"></script>
</head>
<body>
<div id="app">
    <h1>当前微服务名称:{{ serviceName }}</h1>
    <input type="text" v-model="serviceName" placeholder="请输入微服务名称">

    <button v-on:click="saveConfig">保存配置</button>

</div>

</body>
<script>
    new Vue({
        el: '#app',
        data: {
            serviceName: 'User-Center'
        },
        mounted() {
            console.log("=> 模拟向后端 API 发送 GET 请求，拉取系统配置字典...");
        },
        methods: {
            saveConfig: function () {
                console.log(this.serviceName);
            }
        }
    });
</script>
</html>

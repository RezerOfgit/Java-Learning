<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue-生命周期</title>
    <script src="../js/vue.js"></script>
</head>
<body>
<div id="app"></div>
</body>
<script>
    //定义Vue对象
    new Vue({
        el: "#app", //vue接管区域
        data: {
            message: "Hello Vue"
        },
        mounted() {
            alert("vue挂载完成, 请求发送到服务端");
        },
    })
</script>
</html>

spring.application.name=tlias-gemini-task

# 驱动类名称
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 数据库连接 URL
spring.datasource.url=jdbc:mysql://localhost:3306/product_db
# 用户名
spring.datasource.username=root
# 密码
spring.datasource.password=123456

# MyBatis 日志输出到控制台
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 驼峰命名自动映射
mybatis.configuration.map-underscore-to-camel-case=true

# 阿里云 OSS 配置项
aliyun.oss.endpoint=https://oss-cn-shanghai.aliyuncs.com
aliyun.oss.bucketName=web-tlias-rezero
aliyun.oss.accessKeyId=${OSS_ACCESS_KEY_ID}
aliyun.oss.accessKeySecret=${OSS_ACCESS_KEY_SECRET}